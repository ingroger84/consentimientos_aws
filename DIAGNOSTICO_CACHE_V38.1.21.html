<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico de Caché V38.1.21</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .content {
            padding: 40px;
        }
        
        .btn {
            display: block;
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            margin: 20px 0;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
        }
        
        .log {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 20px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            max-height: 400px;
            overflow-y: auto;
            margin: 20px 0;
        }
        
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #667eea;
            padding-left: 10px;
        }
        
        .log-entry.success {
            border-left-color: #28a745;
            color: #4ade80;
        }
        
        .log-entry.error {
            border-left-color: #dc3545;
            color: #f87171;
        }
        
        .log-entry.warning {
            border-left-color: #ffc107;
            color: #fbbf24;
        }
        
        .log-entry.info {
            border-left-color: #17a2b8;
            color: #60a5fa;
        }
        
        .status-box {
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        
        .status-box.error {
            background: #fee;
            border: 2px solid #dc3545;
        }
        
        .status-box.success {
            background: #d4edda;
            border: 2px solid #28a745;
        }
        
        .status-box.warning {
            background: #fff3cd;
            border: 2px solid #ffc107;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Diagnóstico de Caché</h1>
            <p>Versión 38.1.21</p>
        </div>
        
        <div class="content">
            <button onclick="runDiagnostic()" class="btn">
                🔍 Ejecutar Diagnóstico Completo
            </button>
            
            <button onclick="forceClearAndReload()" class="btn btn-danger">
                🔥 Limpiar Caché y Recargar (HARD REFRESH)
            </button>
            
            <div id="log" class="log" style="display: none;">
                <div id="logContent"></div>
            </div>
            
            <div id="statusBox" style="display: none;"></div>
        </div>
    </div>
    
    <script>
        function addLog(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const logContent = document.getElementById('logContent');
            logDiv.style.display = 'block';
            
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logContent.appendChild(entry);
            
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function showStatus(message, type) {
            const statusBox = document.getElementById('statusBox');
            statusBox.style.display = 'block';
            statusBox.className = `status-box ${type}`;
            statusBox.innerHTML = `<h3>${message}</h3>`;
        }
        
        async function runDiagnostic() {
            const logContent = document.getElementById('logContent');
            logContent.innerHTML = '';
            
            addLog('🔍 Iniciando diagnóstico completo...', 'info');
            
            // 1. Verificar localStorage
            addLog('📦 Verificando localStorage...', 'info');
            const storedVersion = localStorage.getItem('app_version');
            const storedTimestamp = localStorage.getItem('build_timestamp');
            
            if (storedVersion) {
                addLog(`   Versión almacenada: ${storedVersion}`, storedVersion === '38.1.21' ? 'success' : 'error');
            } else {
                addLog('   ⚠️ No hay versión almacenada', 'warning');
            }
            
            if (storedTimestamp) {
                addLog(`   Timestamp almacenado: ${storedTimestamp}`, storedTimestamp === '1771475025250' ? 'success' : 'error');
            } else {
                addLog('   ⚠️ No hay timestamp almacenado', 'warning');
            }
            
            // 2. Verificar version.json del servidor
            addLog('🌐 Verificando version.json del servidor...', 'info');
            try {
                const response = await fetch('https://demo-estetica.archivoenlinea.com/version.json?t=' + Date.now(), {
                    cache: 'no-cache',
                    headers: {
                        'Cache-Control': 'no-cache, no-store, must-revalidate',
                        'Pragma': 'no-cache',
                        'Expires': '0'
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    addLog(`   ✅ Versión del servidor: ${data.version}`, 'success');
                    addLog(`   Build Date: ${data.buildDate}`, 'info');
                    addLog(`   Build Hash: ${data.buildHash}`, 'info');
                    addLog(`   Build Timestamp: ${data.buildTimestamp}`, 'info');
                    
                    if (data.version !== '38.1.21') {
                        addLog(`   ❌ ERROR: Versión incorrecta en servidor!`, 'error');
                        showStatus('❌ El servidor NO tiene la versión 38.1.21', 'error');
                    } else if (storedVersion !== data.version || storedTimestamp !== data.buildTimestamp) {
                        addLog(`   ⚠️ ADVERTENCIA: Versión local desactualizada`, 'warning');
                        showStatus('⚠️ Tu navegador tiene una versión antigua cacheada', 'warning');
                    } else {
                        addLog(`   ✅ Versión local coincide con servidor`, 'success');
                        showStatus('✅ Versión correcta, pero el modal sigue sin cerrarse', 'warning');
                    }
                } else {
                    addLog(`   ❌ Error al obtener version.json: ${response.status}`, 'error');
                }
            } catch (error) {
                addLog(`   ❌ Error de red: ${error.message}`, 'error');
            }
            
            // 3. Verificar index.html
            addLog('📄 Verificando index.html...', 'info');
            try {
                const response = await fetch('https://demo-estetica.archivoenlinea.com/?t=' + Date.now(), {
                    cache: 'no-cache',
                    headers: {
                        'Cache-Control': 'no-cache, no-store, must-revalidate',
                        'Pragma': 'no-cache',
                        'Expires': '0'
                    }
                });
                
                if (response.ok) {
                    const html = await response.text();
                    
                    // Buscar meta tags de versión
                    const versionMatch = html.match(/name="app-version" content="([^"]+)"/);
                    const timestampMatch = html.match(/name="build-timestamp" content="([^"]+)"/);
                    
                    if (versionMatch) {
                        addLog(`   Versión en index.html: ${versionMatch[1]}`, versionMatch[1] === '38.1.21' ? 'success' : 'error');
                    }
                    
                    if (timestampMatch) {
                        addLog(`   Timestamp en index.html: ${timestampMatch[1]}`, timestampMatch[1] === '1771475025250' ? 'success' : 'error');
                    }
                    
                    // Buscar script principal
                    const scriptMatch = html.match(/src="\/assets\/(index-[^"]+\.js)"/);
                    if (scriptMatch) {
                        addLog(`   Script principal: ${scriptMatch[1]}`, 'info');
                        
                        // Verificar si el script existe
                        const scriptUrl = `https://demo-estetica.archivoenlinea.com/assets/${scriptMatch[1]}`;
                        try {
                            const scriptResponse = await fetch(scriptUrl, { method: 'HEAD', cache: 'no-cache' });
                            if (scriptResponse.ok) {
                                addLog(`   ✅ Script principal existe en servidor`, 'success');
                            } else {
                                addLog(`   ❌ Script principal NO existe (${scriptResponse.status})`, 'error');
                            }
                        } catch (error) {
                            addLog(`   ❌ Error al verificar script: ${error.message}`, 'error');
                        }
                    }
                } else {
                    addLog(`   ❌ Error al obtener index.html: ${response.status}`, 'error');
                }
            } catch (error) {
                addLog(`   ❌ Error de red: ${error.message}`, 'error');
            }
            
            // 4. Verificar Service Workers
            addLog('🔧 Verificando Service Workers...', 'info');
            if ('serviceWorker' in navigator) {
                const registrations = await navigator.serviceWorker.getRegistrations();
                if (registrations.length > 0) {
                    addLog(`   ⚠️ ${registrations.length} Service Workers activos`, 'warning');
                    addLog(`   Estos pueden estar cacheando archivos antiguos`, 'warning');
                } else {
                    addLog(`   ✅ No hay Service Workers activos`, 'success');
                }
            }
            
            // 5. Verificar Cache API
            addLog('💾 Verificando Cache API...', 'info');
            if ('caches' in window) {
                const cacheNames = await caches.keys();
                if (cacheNames.length > 0) {
                    addLog(`   ⚠️ ${cacheNames.length} cachés encontrados:`, 'warning');
                    cacheNames.forEach(name => {
                        addLog(`      - ${name}`, 'info');
                    });
                } else {
                    addLog(`   ✅ No hay cachés activos`, 'success');
                }
            }
            
            // 6. Verificar archivos cargados actualmente
            addLog('📦 Verificando archivos JavaScript cargados...', 'info');
            const scripts = document.querySelectorAll('script[src]');
            scripts.forEach(script => {
                const src = script.getAttribute('src');
                if (src && src.includes('CreateMedicalRecordPage')) {
                    addLog(`   Script de CreateMedicalRecordPage: ${src}`, 'info');
                    if (src.includes('9LkIiApv')) {
                        addLog(`   ✅ Versión correcta (9LkIiApv)`, 'success');
                    } else {
                        addLog(`   ❌ Versión INCORRECTA`, 'error');
                    }
                }
            });
            
            addLog('✅ Diagnóstico completado', 'success');
        }
        
        async function forceClearAndReload() {
            addLog('🔥 Iniciando limpieza agresiva de caché...', 'warning');
            
            try {
                // 1. Limpiar localStorage
                addLog('Limpiando localStorage...', 'info');
                const keysToKeep = ['auth_token', 'user_data', 'tenant_data'];
                const storage = {};
                keysToKeep.forEach(key => {
                    const value = localStorage.getItem(key);
                    if (value) storage[key] = value;
                });
                
                localStorage.clear();
                
                keysToKeep.forEach(key => {
                    if (storage[key]) localStorage.setItem(key, storage[key]);
                });
                
                localStorage.setItem('app_version', '38.1.21');
                localStorage.setItem('build_timestamp', '1771475025250');
                addLog('✅ localStorage limpiado', 'success');
                
                // 2. Limpiar sessionStorage
                addLog('Limpiando sessionStorage...', 'info');
                sessionStorage.clear();
                addLog('✅ sessionStorage limpiado', 'success');
                
                // 3. Desregistrar Service Workers
                if ('serviceWorker' in navigator) {
                    addLog('Desregistrando Service Workers...', 'info');
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    for (let registration of registrations) {
                        await registration.unregister();
                    }
                    addLog(`✅ ${registrations.length} Service Workers desregistrados`, 'success');
                }
                
                // 4. Limpiar Cache API
                if ('caches' in window) {
                    addLog('Limpiando Cache API...', 'info');
                    const cacheNames = await caches.keys();
                    for (let name of cacheNames) {
                        await caches.delete(name);
                    }
                    addLog(`✅ ${cacheNames.length} cachés eliminados`, 'success');
                }
                
                addLog('🎉 Limpieza completada', 'success');
                addLog('🔄 Recargando página en 2 segundos...', 'info');
                
                setTimeout(() => {
                    // Hard reload con Ctrl+Shift+R
                    window.location.reload(true);
                }, 2000);
                
            } catch (error) {
                addLog(`❌ Error durante limpieza: ${error.message}`, 'error');
            }
        }
        
        // Ejecutar diagnóstico automáticamente al cargar
        window.addEventListener('load', () => {
            setTimeout(runDiagnostic, 500);
        });
    </script>
</body>
</html>
