# Configuración de Nginx para Redirección de www
# Archivo: /etc/nginx/sites-available/www-redirect.conf
#
# Propósito: Redirigir todas las URLs con www a sus versiones sin www
# Ejemplos:
#   - www.termaleses.archivoenlinea.com → termaleses.archivoenlinea.com
#   - www.archivoenlinea.com → archivoenlinea.com
#   - www.admin.archivoenlinea.com → admin.archivoenlinea.com

# ============================================================================
# Redirigir www.*.archivoenlinea.com a *.archivoenlinea.com
# ============================================================================
# NOTA: Solo HTTP (puerto 80) porque los certificados wildcard NO cubren
# subdominios de segundo nivel como www.termaleses.archivoenlinea.com
server {
    listen 80;
    
    # Capturar cualquier subdominio después de www
    # Ejemplo: www.termaleses.archivoenlinea.com → $subdomain = "termaleses"
    server_name ~^www\.(?<subdomain>.+)\.archivoenlinea\.com$;
    
    # Redirigir permanentemente (301) a la versión sin www
    # Preserva el subdominio y la URI completa
    return 301 http://$subdomain.archivoenlinea.com$request_uri;
}

# ============================================================================
# Redirigir www.archivoenlinea.com a archivoenlinea.com
# ============================================================================
# NOTA: Incluye HTTP y HTTPS porque existe certificado para www.archivoenlinea.com
server {
    listen 80;
    listen 443 ssl http2;
    
    server_name www.archivoenlinea.com;
    
    # Certificado SSL (existe certificado específico para www.archivoenlinea.com)
    ssl_certificate /etc/letsencrypt/live/www.archivoenlinea.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.archivoenlinea.com/privkey.pem;
    
    # Configuración SSL básica
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    
    # Redirigir permanentemente (301) a la versión sin www
    return 301 $scheme://archivoenlinea.com$request_uri;
}

# ============================================================================
# INSTRUCCIONES DE INSTALACIÓN
# ============================================================================
#
# 1. Copiar este archivo al servidor:
#    scp -i AWS-ISSABEL.pem config/nginx/www-redirect.conf ubuntu@100.28.198.249:/tmp/
#
# 2. Mover al directorio de nginx:
#    sudo mv /tmp/www-redirect.conf /etc/nginx/sites-available/
#
# 3. Crear enlace simbólico:
#    sudo ln -s /etc/nginx/sites-available/www-redirect.conf /etc/nginx/sites-enabled/
#
# 4. Verificar configuración:
#    sudo nginx -t
#
# 5. Recargar nginx:
#    sudo nginx -s reload
#
# 6. Probar redirecciones:
#    curl -I http://www.termaleses.archivoenlinea.com
#    curl -I http://www.archivoenlinea.com
#
# ============================================================================
# NOTAS IMPORTANTES
# ============================================================================
#
# - Los certificados wildcard (*.archivoenlinea.com) NO cubren subdominios de
#   segundo nivel como www.termaleses.archivoenlinea.com
#
# - Por eso, la redirección para www.*.archivoenlinea.com solo funciona en HTTP
#
# - Si un usuario intenta acceder a https://www.termaleses.archivoenlinea.com
#   verá un error de certificado (esto es esperado y normal)
#
# - La redirección para www.archivoenlinea.com funciona en HTTP y HTTPS porque
#   existe un certificado específico para ese dominio
#
# - Recomendación: Comunicar a los usuarios que usen URLs sin www:
#   * ✅ https://termaleses.archivoenlinea.com
#   * ❌ https://www.termaleses.archivoenlinea.com
#

