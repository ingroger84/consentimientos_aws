<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Actualizar a V42.1.2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 10px;
        }
        .version {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 1.3em;
            font-weight: bold;
            display: inline-block;
            margin: 20px 0;
        }
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 8px;
            font-weight: 600;
        }
        .status.info { background: #d1ecf1; color: #0c5460; }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s;
            font-weight: 600;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }
        .instructions {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin: 20px 0;
            text-align: left;
            border-radius: 8px;
            font-size: 0.9em;
        }
        .instructions p { margin: 8px 0; color: #666; }
        .instructions strong { color: #667eea; }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            color: #e83e8c;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔄 Actualización Disponible</h1>
        <div class="version">Versión 42.1.2</div>
        
        <div id="status" class="status info">
            ℹ️ Presiona el botón para actualizar
        </div>
        
        <button class="btn" onclick="clearAndReload()">
            🚀 Actualizar Ahora
        </button>
        
        <button class="btn" onclick="checkVersion()">
            🔍 Verificar Versión
        </button>
        
        <div class="instructions">
            <p><strong>Si el botón no funciona:</strong></p>
            <p>• Windows/Linux: <code>Ctrl + Shift + R</code></p>
            <p>• Mac: <code>Cmd + Shift + R</code></p>
            <p>• Móvil: Limpia caché desde configuración</p>
        </div>
    </div>
    
    <script>
        const APP_URL = 'https://demo-estetica.archivoenlinea.com';
        
        async function clearAndReload() {
            const status = document.getElementById('status');
            status.className = 'status info';
            status.innerHTML = '⏳ Limpiando caché...<span class="spinner"></span>';
            
            try {
                // Limpiar Service Workers
                if ('serviceWorker' in navigator) {
                    const regs = await navigator.serviceWorker.getRegistrations();
                    await Promise.all(regs.map(r => r.unregister()));
                }
                
                // Limpiar Cache Storage
                if ('caches' in window) {
                    const names = await caches.keys();
                    await Promise.all(names.map(n => caches.delete(n)));
                }
                
                // Limpiar Storage
                localStorage.clear();
                sessionStorage.clear();
                
                status.className = 'status success';
                status.innerHTML = '✅ Caché limpiado. Redirigiendo...';
                
                setTimeout(() => {
                    window.location.href = APP_URL + '/?v=' + Date.now();
                }, 1500);
                
            } catch (error) {
                status.className = 'status error';
                status.innerHTML = '❌ Error: ' + error.message + '<br>Intenta Ctrl+Shift+R';
            }
        }
        
        async function checkVersion() {
            const status = document.getElementById('status');
            status.className = 'status info';
            status.innerHTML = '🔍 Verificando...<span class="spinner"></span>';
            
            try {
                const t = Date.now();
                
                // Backend
                const backendRes = await fetch(APP_URL + '/api/health/detailed?t=' + t, {
                    cache: 'no-cache'
                });
                const backendData = await backendRes.json();
                const backendVer = backendData.version?.version || backendData.version || '?';
                
                // Frontend
                const frontendRes = await fetch(APP_URL + '/version.json?t=' + t, {
                    cache: 'no-cache'
                });
                const frontendData = await frontendRes.json();
                const frontendVer = frontendData.version || '?';
                
                if (backendVer === '42.1.2' && frontendVer === '42.1.2') {
                    status.className = 'status success';
                    status.innerHTML = '✅ ¡Actualizado! Backend: ' + backendVer + ' | Frontend: ' + frontendVer;
                } else {
                    status.className = 'status error';
                    status.innerHTML = '⚠️ Versión antigua. Backend: ' + backendVer + ' | Frontend: ' + frontendVer + '<br>Presiona "Actualizar Ahora"';
                }
                
            } catch (error) {
                status.className = 'status error';
                status.innerHTML = '❌ Error: ' + error.message;
            }
        }
        
        // Auto-verificar al cargar
        window.addEventListener('load', () => {
            setTimeout(checkVersion, 1000);
        });
    </script>
</body>
</html>
