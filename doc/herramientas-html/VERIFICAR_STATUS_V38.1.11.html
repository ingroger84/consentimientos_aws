<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación Estado del Sistema v38.1.11</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        
        h1 {
            color: #1e3a8a;
            margin-bottom: 10px;
        }
        
        .version {
            color: #3b82f6;
            font-size: 24px;
            font-weight: bold;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .card-title {
            font-size: 20px;
            font-weight: bold;
            color: #1e3a8a;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            font-weight: 500;
        }
        
        .status-loading {
            background: #fef3c7;
            color: #92400e;
        }
        
        .status-success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status-error {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid #f3f4f6;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .check {
            width: 20px;
            height: 20px;
            background: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        
        .error {
            width: 20px;
            height: 20px;
            background: #ef4444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        
        .details {
            background: #f8fafc;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            font-family: monospace;
            font-size: 13px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .btn {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .link {
            display: block;
            text-align: center;
            color: white;
            text-decoration: none;
            margin-top: 20px;
            font-weight: 500;
        }
        
        .link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Verificación del Sistema</h1>
            <div class="version">Versión 38.1.11</div>
        </div>
        
        <div class="card">
            <div class="card-title">
                📡 Estado de la Página /status
            </div>
            <div id="statusCheck" class="status status-loading">
                <div class="spinner"></div>
                <span>Verificando página de estado...</span>
            </div>
            <div id="statusDetails" class="details" style="display: none;"></div>
        </div>
        
        <div class="card">
            <div class="card-title">
                📦 Versión del Frontend
            </div>
            <div id="versionCheck" class="status status-loading">
                <div class="spinner"></div>
                <span>Verificando versión...</span>
            </div>
            <div id="versionDetails" class="details" style="display: none;"></div>
        </div>
        
        <div class="card">
            <div class="card-title">
                🔧 Caché del Navegador
            </div>
            <div id="cacheCheck" class="status status-loading">
                <div class="spinner"></div>
                <span>Verificando caché...</span>
            </div>
            <div id="cacheDetails" class="details" style="display: none;"></div>
            <button class="btn" onclick="clearAllCache()">🧹 Limpiar Caché Completo</button>
        </div>
        
        <div class="card">
            <div class="card-title">
                ✅ Acciones
            </div>
            <button class="btn" onclick="runAllTests()">🔄 Ejecutar Todas las Pruebas</button>
            <button class="btn" onclick="openStatusPage()">🚀 Abrir Página de Estado</button>
        </div>
        
        <a href="https://archivoenlinea.com" class="link">← Volver a Archivo en Línea</a>
    </div>
    
    <script>
        let testResults = {
            status: false,
            version: false,
            cache: false
        };
        
        async function checkStatusPage() {
            const statusDiv = document.getElementById('statusCheck');
            const detailsDiv = document.getElementById('statusDetails');
            
            try {
                const response = await fetch('https://archivoenlinea.com/status?v=' + Date.now(), {
                    cache: 'no-cache',
                    headers: {
                        'Cache-Control': 'no-cache, no-store, must-revalidate',
                        'Pragma': 'no-cache'
                    }
                });
                
                if (response.ok) {
                    const html = await response.text();
                    
                    // Verificar que no contenga el error de React
                    if (html.includes('Minified React error')) {
                        throw new Error('La página contiene error de React');
                    }
                    
                    statusDiv.className = 'status status-success';
                    statusDiv.innerHTML = '<div class="check">✓</div><span>Página /status carga correctamente</span>';
                    detailsDiv.textContent = 'Status: ' + response.status + '\nSize: ' + html.length + ' bytes\nNo se detectaron errores de React';
                    detailsDiv.style.display = 'block';
                    testResults.status = true;
                } else {
                    throw new Error('HTTP ' + response.status);
                }
            } catch (error) {
                statusDiv.className = 'status status-error';
                statusDiv.innerHTML = '<div class="error">✗</div><span>Error al cargar /status: ' + error.message + '</span>';
                detailsDiv.textContent = 'Error: ' + error.message + '\n\nPor favor, limpia el caché del navegador.';
                detailsDiv.style.display = 'block';
                testResults.status = false;
            }
        }
        
        async function checkVersion() {
            const versionDiv = document.getElementById('versionCheck');
            const detailsDiv = document.getElementById('versionDetails');
            
            try {
                const response = await fetch('https://archivoenlinea.com/version.json?v=' + Date.now(), {
                    cache: 'no-cache',
                    headers: {
                        'Cache-Control': 'no-cache, no-store, must-revalidate',
                        'Pragma': 'no-cache'
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    
                    if (data.version === '38.1.11') {
                        versionDiv.className = 'status status-success';
                        versionDiv.innerHTML = '<div class="check">✓</div><span>Versión correcta: ' + data.version + '</span>';
                        detailsDiv.textContent = JSON.stringify(data, null, 2);
                        detailsDiv.style.display = 'block';
                        testResults.version = true;
                    } else {
                        throw new Error('Versión incorrecta: ' + data.version + ' (esperada: 38.1.11)');
                    }
                } else {
                    throw new Error('HTTP ' + response.status);
                }
            } catch (error) {
                versionDiv.className = 'status status-error';
                versionDiv.innerHTML = '<div class="error">✗</div><span>Error: ' + error.message + '</span>';
                detailsDiv.textContent = 'Error: ' + error.message + '\n\nLimpia el caché y recarga la página.';
                detailsDiv.style.display = 'block';
                testResults.version = false;
            }
        }
        
        async function checkCache() {
            const cacheDiv = document.getElementById('cacheCheck');
            const detailsDiv = document.getElementById('cacheDetails');
            
            try {
                let cacheInfo = [];
                
                // Verificar Service Workers
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    cacheInfo.push('Service Workers: ' + registrations.length);
                }
                
                // Verificar Cache Storage
                if ('caches' in window) {
                    const cacheNames = await caches.keys();
                    cacheInfo.push('Cache Storage: ' + cacheNames.length + ' caches');
                    cacheInfo.push('Nombres: ' + cacheNames.join(', '));
                }
                
                // Verificar localStorage
                cacheInfo.push('localStorage items: ' + localStorage.length);
                
                // Verificar sessionStorage
                cacheInfo.push('sessionStorage items: ' + sessionStorage.length);
                
                cacheDiv.className = 'status status-success';
                cacheDiv.innerHTML = '<div class="check">✓</div><span>Información de caché obtenida</span>';
                detailsDiv.textContent = cacheInfo.join('\n');
                detailsDiv.style.display = 'block';
                testResults.cache = true;
            } catch (error) {
                cacheDiv.className = 'status status-error';
                cacheDiv.innerHTML = '<div class="error">✗</div><span>Error: ' + error.message + '</span>';
                detailsDiv.textContent = 'Error: ' + error.message;
                detailsDiv.style.display = 'block';
                testResults.cache = false;
            }
        }
        
        async function clearAllCache() {
            const cacheDiv = document.getElementById('cacheCheck');
            const detailsDiv = document.getElementById('cacheDetails');
            
            cacheDiv.className = 'status status-loading';
            cacheDiv.innerHTML = '<div class="spinner"></div><span>Limpiando caché...</span>';
            
            try {
                let cleared = [];
                
                // Limpiar Cache Storage
                if ('caches' in window) {
                    const cacheNames = await caches.keys();
                    for (let name of cacheNames) {
                        await caches.delete(name);
                    }
                    cleared.push('✓ Cache Storage limpiado (' + cacheNames.length + ' caches)');
                }
                
                // Limpiar Service Workers
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    for (let registration of registrations) {
                        await registration.unregister();
                    }
                    cleared.push('✓ Service Workers desregistrados (' + registrations.length + ')');
                }
                
                // Limpiar localStorage
                localStorage.clear();
                cleared.push('✓ localStorage limpiado');
                
                // Limpiar sessionStorage
                sessionStorage.clear();
                cleared.push('✓ sessionStorage limpiado');
                
                cacheDiv.className = 'status status-success';
                cacheDiv.innerHTML = '<div class="check">✓</div><span>Caché limpiado exitosamente</span>';
                detailsDiv.textContent = cleared.join('\n') + '\n\nAhora recarga la página con Ctrl+F5';
                detailsDiv.style.display = 'block';
                
                // Recargar después de 2 segundos
                setTimeout(() => {
                    window.location.reload(true);
                }, 2000);
            } catch (error) {
                cacheDiv.className = 'status status-error';
                cacheDiv.innerHTML = '<div class="error">✗</div><span>Error al limpiar: ' + error.message + '</span>';
                detailsDiv.textContent = 'Error: ' + error.message;
                detailsDiv.style.display = 'block';
            }
        }
        
        async function runAllTests() {
            await checkStatusPage();
            await new Promise(resolve => setTimeout(resolve, 500));
            await checkVersion();
            await new Promise(resolve => setTimeout(resolve, 500));
            await checkCache();
            
            // Mostrar resumen
            const allPassed = testResults.status && testResults.version && testResults.cache;
            if (allPassed) {
                alert('✅ Todas las pruebas pasaron correctamente!\n\nLa versión 38.1.11 está funcionando bien.');
            } else {
                alert('⚠️ Algunas pruebas fallaron.\n\nPor favor, limpia el caché del navegador y vuelve a intentar.');
            }
        }
        
        function openStatusPage() {
            window.open('https://archivoenlinea.com/status?v=' + Date.now(), '_blank');
        }
        
        // Ejecutar pruebas al cargar
        window.addEventListener('load', async () => {
            await runAllTests();
        });
    </script>
</body>
</html>
