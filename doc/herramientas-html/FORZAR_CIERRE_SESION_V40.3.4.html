<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forzar Cierre de Sesión</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 {
            color: #667eea;
            margin-bottom: 20px;
        }
        .alert {
            background: #fff3cd;
            border-left: 5px solid #ffc107;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }
        button {
            background: #dc3545;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            background: #c82333;
        }
        .success {
            background: #d4edda;
            border-left: 5px solid #28a745;
            padding: 20px;
            margin: 20px 0;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Actualización de Permisos</h1>
        <div class="alert">
            <strong>⚠️ Acción Requerida:</strong><br><br>
            Se actualizaron los permisos del rol "Operador" para permitir cerrar admisiones.
            <br><br>
            Debes cerrar sesión y volver a iniciar para que los cambios surtan efecto.
        </div>
        <button onclick="forceLogout()">🚪 Cerrar Sesión y Limpiar Caché</button>
        <div id="success" class="success">
            <strong>✅ Sesión cerrada exitosamente</strong><br>
            Redirigiendo al login...
        </div>
    </div>
    <script>
        function forceLogout() {
            localStorage.clear();
            sessionStorage.clear();
            document.getElementById('success').style.display = 'block';
            setTimeout(() => {
                window.location.href = 'https://demo-estetica.archivoenlinea.com/login';
            }, 2000);
        }
    </script>
</body>
</html>
